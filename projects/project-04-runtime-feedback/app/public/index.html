<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Knowledge Base</title>
  </head>
  <body>
    <h3>Ask</h3>
    <input id="q" size="40" /><button onclick="ask()">Ask</button>
    <div id="answer"></div>
    <script>
      // UI layer: talks to the server over HTTP only. No Node/storage APIs here.
      function ask() {
        fetch('/api/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ q: document.getElementById('q').value }),
        })
          .then((r) => r.json())
          .then((res) => { document.getElementById('answer').innerText = res.answer; });
      }
    </script>
  </body>
</html>
